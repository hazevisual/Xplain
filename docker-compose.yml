version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: xplain-postgres
    environment:
      POSTGRES_DB: xplain
      POSTGRES_USER: xplain
      POSTGRES_PASSWORD: xplain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: xplain-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
